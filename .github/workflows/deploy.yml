name: Deploy to Firebase Hosting

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - run: pnpm install --frozen-lockfile
      - run: pnpm build

      # Hosting (with headers + rewrites from firebase.json). This is the
      # critical path and must always succeed.
      - name: Deploy Hosting
        run: |
          echo "$FIREBASE_SERVICE_ACCOUNT" > "$RUNNER_TEMP/sa.json"
          export GOOGLE_APPLICATION_CREDENTIALS="$RUNNER_TEMP/sa.json"
          npx --yes firebase-tools@13 deploy \
            --only hosting \
            --project apexline-studios \
            --non-interactive --force
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_APEXLINE }}

      # Security rules + indexes. Requires the service account to have the
      # Firebase Rules Admin / Cloud Datastore + Storage roles. Non-blocking
      # until those IAM roles are granted, so a missing permission does not
      # break the hosting deploy above. Watch this step's log — once it turns
      # green the hardened rules are live.
      - name: Deploy Firestore & Storage rules
        continue-on-error: true
        run: |
          echo "$FIREBASE_SERVICE_ACCOUNT" > "$RUNNER_TEMP/sa.json"
          export GOOGLE_APPLICATION_CREDENTIALS="$RUNNER_TEMP/sa.json"
          npx --yes firebase-tools@13 deploy \
            --only firestore:rules,firestore:indexes,storage \
            --project apexline-studios \
            --non-interactive --force
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_APEXLINE }}
