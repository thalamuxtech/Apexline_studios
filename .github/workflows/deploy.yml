name: Deploy to Firebase Hosting

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - run: pnpm install --frozen-lockfile
      - run: pnpm build

      # Full deploy: hosting (with headers + rewrites), Firestore rules &
      # indexes, and Storage rules — the hosting-only action deployed none of
      # the rules/config, so security rules and rewrites never reached prod.
      - name: Deploy Hosting + Firestore + Storage
        run: |
          echo "$FIREBASE_SERVICE_ACCOUNT" > "$RUNNER_TEMP/sa.json"
          export GOOGLE_APPLICATION_CREDENTIALS="$RUNNER_TEMP/sa.json"
          npx --yes firebase-tools@13 deploy \
            --only hosting,firestore:rules,firestore:indexes,storage \
            --project apexline-studios \
            --non-interactive --force
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_APEXLINE }}
